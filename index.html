<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฟอร์มเก็บข้อมูลนักเรียน</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, sans-serif;
}

body{
    background:linear-gradient(135deg,#FFF9D9,#FFE680,#FFFDF2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:900px;
    background:#ffffff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#d4a000;
    margin-bottom:25px;
}

fieldset{
    border:2px solid #FFD54F;
    border-radius:15px;
    margin-bottom:20px;
    padding:20px;
}

legend{
    padding:8px 18px;
    background:#FFD54F;
    color:#fff;
    border-radius:20px;
    font-weight:bold;
}

.form-group{
    display:grid;
    grid-template-columns:200px 1fr;
    align-items:center;
    gap:15px;
    margin:12px 0;
}

label{
    font-weight:bold;
    color:#555;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:2px solid #FFE082;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#FFC107;
    box-shadow:0 0 8px rgba(255,193,7,.4);
}

textarea{
    resize:vertical;
}

.inline{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.inline label{
    font-weight:normal;
}

.buttons{
    text-align:center;
    margin-top:20px;
}

button{
    padding:12px 35px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    margin:8px;
    transition:.3s;
}

.submit{
    background:#FBC02D;
    color:white;
}

.submit:hover{
    background:#F9A825;
    transform:scale(1.05);
}

.reset{
    background:#EEEEEE;
}

.reset:hover{
    background:#CCCCCC;
}

.footer-check{
    display:flex;
    align-items:center;
    gap:10px;
}

input[type="checkbox"],
input[type="radio"]{
    width:auto;
}

input[type="color"]{
    height:50px;
}

@media(max-width:768px){

.form-group{
    grid-template-columns:1fr;
}

.container{
    padding:20px;
}

}
</style>

</head>

<body>

<div class="container">

<h1>📒 ฟอร์มเก็บข้อมูลนักเรียน</h1>

<form>

<!-- ข้อมูลส่วนตัว -->
<fieldset>

<legend>1. ข้อมูลส่วนตัว</legend>

<div class="form-group">
<label>คำนำหน้า</label>
<select required>
<option>นาย</option>
<option>นางสาว</option>
<option>นาง</option>
</select>
</div>

<div class="form-group">
<label>ชื่อ-นามสกุล</label>
<input type="text" required>
</div>

<div class="form-group">
<label>ชื่อเล่น</label>
<input type="text">
</div>

<div class="form-group">
<label>เลขประจำตัวนักเรียน</label>
<input type="number" required>
</div>

<div class="form-group">
<label>วันเดือนปีเกิด</label>
<input type="date">
</div>

<div class="form-group">
<label>อายุ</label>
<input type="number" min="1" max="100">
</div>

</fieldset>

<!-- ติดต่อ -->

<fieldset>

<legend>2. ข้อมูลการติดต่อ</legend>

<div class="form-group">
<label>อีเมล</label>
<input type="email">
</div>

<div class="form-group">
<label>เบอร์โทรศัพท์</label>
<input type="tel" placeholder="08xxxxxxxx">
</div>

<div class="form-group">
<label>ที่อยู่</label>
<textarea rows="3"></textarea>
</div>

</fieldset>

<!-- ส่วนบุคคล -->

<fieldset>

<legend>3. ข้อมูลส่วนบุคคล</legend>

<div class="form-group">
<label>เพศ</label>

<div class="inline">
<label><input type="radio" name="gender"> ชาย</label>
<label><input type="radio" name="gender"> หญิง</label>
<label><input type="radio" name="gender"> อื่น ๆ</label>
</div>

</div>

<div class="form-group">
<label>ศาสนา</label>

<select>
<option>พุทธ</option>
<option>คริสต์</option>
<option>อิสลาม</option>
<option>ฮินดู</option>
<option>อื่น ๆ</option>
</select>

</div>

<div class="form-group">
<label>จังหวัด</label>
<input type="text">
</div>

<div class="form-group">
<label>กรุ๊ปเลือด</label>

<select>
<option>A</option>
<option>B</option>
<option>AB</option>
<option>O</option>
</select>

</div>

</fieldset>

<!-- ความสนใจ -->

<fieldset>

<legend>4. ความสนใจ</legend>

<div class="form-group">

<label>งานอดิเรก</label>

<div class="inline">
<label><input type="checkbox"> อ่านหนังสือ</label>
<label><input type="checkbox"> เล่นกีฬา</label>
<label><input type="checkbox"> ฟังเพลง</label>
<label><input type="checkbox"> เล่นเกม</label>
<label><input type="checkbox"> ดูหนัง</label>
</div>

</div>

<div class="form-group">
<label>สีที่ชอบ</label>
<input type="color">
</div>

<div class="form-group">
<label>เว็บไซต์ที่ชอบ</label>
<input type="url" placeholder="https://example.com">
</div>

</fieldset>

<!-- การศึกษา -->

<fieldset>

<legend>5. ข้อมูลการศึกษา</legend>

<div class="form-group">
<label>ระดับชั้น</label>

<select>
<option>มัธยมศึกษาปีที่ 1</option>
<option>มัธยมศึกษาปีที่ 2</option>
<option>มัธยมศึกษาปีที่ 3</option>
<option>มัธยมศึกษาปีที่ 4</option>
<option>มัธยมศึกษาปีที่ 5</option>
<option>มัธยมศึกษาปีที่ 6</option>
</select>

</div>

<div class="form-group">
<label>ห้องเรียน</label>
<input type="text">
</div>

<div class="form-group">
<label>แผนการเรียน</label>

<select>
<option>วิทย์-คณิต</option>
<option>ศิลป์-คำนวณ</option>
<option>ศิลป์-ภาษา</option>
<option>ทั่วไป</option>
</select>

</div>

<div class="form-group">
<label>เกรดเฉลี่ย</label>
<input type="number" min="0" max="4" step="0.01">
</div>

</fieldset>

<!-- อัปโหลด -->

<fieldset>

<legend>6. การอัปโหลดไฟล์</legend>

<div class="form-group">
<label>รูปภาพประจำตัว</label>
<input type="file" accept="image/*">
</div>

<div class="form-group">
<label>เอกสารเพิ่มเติม</label>
<input type="file">
</div>

</fieldset>

<!-- ความคิดเห็น -->

<fieldset>

<legend>7. ความคิดเห็นเพิ่มเติม</legend>

<div class="form-group">

<label>แสดงความคิดเห็น</label>

<textarea rows="5" placeholder="กรอกความคิดเห็นเพิ่มเติม..."></textarea>

</div>

</fieldset>

<!-- ยืนยัน -->

<fieldset>

<legend>8. ยืนยันข้อมูล</legend>

<div class="footer-check">

<input type="checkbox" required>

<label>ข้าพเจ้ายอมรับเงื่อนไขการใช้งานและยืนยันว่าข้อมูลทั้งหมดถูกต้อง</label>

</div>

<div class="buttons">

<button type="submit" class="submit">📩 ส่งข้อมูล</button>

<button type="reset" class="reset">🗑 ล้างข้อมูล</button>

</div>

</fieldset>

</form>

</div>

</body>
</html>
